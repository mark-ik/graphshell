id: "facet:pane-route-blocked-multiselect"
description: "Facet-pane routing is blocked during multi-select and emits an explicit warning without silently changing focus."
tags: [ux, facets, routing, blocked]
seed_rng: 0
input_mode: Keyboard
preconditions:
  - graph_has_nodes: 2
steps:
  - action: EnsureMultiNodeSelected
  - action: InvokeUxAction
    target: "uxnode://workbench/graph-view/selection"
    action_kind: EnterFacetRail
  - assert: DiagnosticsChannel
    channel: "ux:facet_pane_route_blocked"
    expect_no_severity: Error
    within_frames: 60
  - assert: UxNodeExists
    selector:
      role: StatusIndicator
      label: "Facet routing unavailable for multi-select"
    within_frames: 60
  - assert: FocusPath
    ends_with: "uxnode://workbench/graph-view/facet-rail"
    within_frames: 60

