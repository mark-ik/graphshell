name: Nightly Full Matrix

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  full-matrix:
    name: nightly-full (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo check (locked)
        run: cargo check --locked

      - name: Policy lint (Windows)
        if: runner.os == 'Windows'
        run: pwsh -NoProfile -File scripts/dev/test-select.ps1 lint-policy --platform windows

      - name: Policy lint (Linux)
        if: runner.os == 'Linux'
        run: pwsh -NoProfile -File scripts/dev/test-select.ps1 lint-policy --platform linux

      - name: Policy lint (macOS)
        if: runner.os == 'macOS'
        run: pwsh -NoProfile -File scripts/dev/test-select.ps1 lint-policy --platform macos

      - name: Run nightly policy packs (Windows)
        if: runner.os == 'Windows'
        run: pwsh -NoProfile -File scripts/dev/test-select.ps1 run-policy --tier nightly --platform windows --quiet

      - name: Run nightly policy packs (Linux)
        if: runner.os == 'Linux'
        run: pwsh -NoProfile -File scripts/dev/test-select.ps1 run-policy --tier nightly --platform linux --quiet

      - name: Run nightly policy packs (macOS)
        if: runner.os == 'macOS'
        run: pwsh -NoProfile -File scripts/dev/test-select.ps1 run-policy --tier nightly --platform macos --quiet
