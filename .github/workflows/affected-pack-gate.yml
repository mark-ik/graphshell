name: Affected Pack Gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  affected-pack-gate:
    name: affected-pack-gate (ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Linux system dependencies
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev libudev-dev pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cargo check (locked)
        run: cargo check --locked

      - name: Engine feature matrix
        run: bash scripts/dev/engine-feature-matrix.sh

      - name: Fetch PR base branch
        if: github.event_name == 'pull_request'
        run: git fetch origin ${{ github.base_ref }} --depth=1

      - name: Policy lint (PR)
        if: github.event_name == 'pull_request'
        run: pwsh -NoProfile -File scripts/dev/test-select.ps1 lint-policy --platform linux --base origin/${{ github.base_ref }}

      - name: Policy lint (main push)
        if: github.event_name != 'pull_request'
        run: pwsh -NoProfile -File scripts/dev/test-select.ps1 lint-policy --platform linux

      - name: Run affected validation packs (PR)
        if: github.event_name == 'pull_request'
        run: pwsh -NoProfile -File scripts/dev/test-select.ps1 run-policy --tier pr-required --platform linux --affected --base origin/${{ github.base_ref }} --quiet

      - name: Run core validation packs (main push)
        if: github.event_name != 'pull_request'
        run: pwsh -NoProfile -File scripts/dev/test-select.ps1 run-policy --tier pr-required --platform linux --quiet
