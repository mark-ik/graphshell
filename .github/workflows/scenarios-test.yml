name: Scenarios Test Binary

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scenarios:
    name: scenarios (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            allow_failure: false
          - os: windows-latest
            allow_failure: false
          - os: macos-latest
            allow_failure: true

    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.allow_failure }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Configure platform test environment
        shell: pwsh
        run: |
          $lane = switch ("${{ runner.os }}") {
            'Linux' { 'linux' }
            'Windows' { 'windows' }
            'macOS' { 'macos' }
            default { throw "Unsupported runner OS: ${{ runner.os }}" }
          }

          "GRAPHSHELL_CARGO_LANE=$lane" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CARGO_TARGET_DIR=${{ github.workspace }}/target/${lane}_target" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Lint + run scenario policy pack
        shell: pwsh
        run: |
          $platform = switch ("${{ runner.os }}") {
            'Linux' { 'linux' }
            'Windows' { 'windows' }
            'macOS' { 'macos' }
            default { throw "Unsupported runner OS: ${{ runner.os }}" }
          }

          pwsh -NoProfile -File scripts/dev/test-select.ps1 lint-policy --platform $platform
          pwsh -NoProfile -File scripts/dev/test-select.ps1 run-policy --tier pr-optional --platform $platform --quiet
