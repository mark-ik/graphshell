name: Scenarios Test Binary

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scenarios:
    name: scenarios (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            allow_failure: false
          - os: windows-latest
            allow_failure: false
          - os: macos-latest
            allow_failure: true

    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.allow_failure }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run scenarios binary
        run: cargo test --features test-utils --test scenarios
